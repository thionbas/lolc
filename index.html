<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LO/LC PRINTER - Batch Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen">

    <header class="bg-[#064e3b] p-5 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase">LO/LC PRINTER</h1>
            <a href="https://thionbas.github.io/printerapp" class="text-white border border-white px-4 py-2 rounded hover:bg-white hover:text-[#064e3b] transition font-bold">← ZURÜCK</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-10 mt-6">
        
        <section class="bg-white p-8 rounded-lg shadow-xl border border-gray-200">
            <h2 class="text-xl font-bold border-b pb-2 mb-6 uppercase text-gray-700">Konfiguration</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Status (für alle Etiketten)</label>
                    <select id="statusType" class="w-full p-4 border-2 rounded-md font-bold text-xl outline-none focus:border-[#064e3b]">
                        <option value="LO">LO (Grün / Schwarz)</option>
                        <option value="LC">LC (Rot / Weiß)</option>
                        <option value="NO">NO (Grün / Schwarz)</option>
                        <option value="NC">NC (Rot / Weiß)</option>
                        <option value="EA">EA (Weiß / Schwarz)</option>
                    </select>
                </div>

                <div class="flex gap-4 p-1 bg-gray-100 rounded-md">
                    <button id="modeSingle" class="flex-1 py-2 rounded font-bold transition bg-white shadow-sm border border-gray-300">Einzel-Modus</button>
                    <button id="modeList" class="flex-1 py-2 rounded font-bold transition text-gray-500 hover:text-gray-700">Listen-Modus</button>
                </div>

                <div id="inputSingle">
                    <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Nummerierung</label>
                    <input type="text" id="idInput" placeholder="bitte nummer eingeben" class="w-full p-4 border-2 rounded-md font-bold text-2xl outline-none focus:border-[#064e3b]">
                </div>

                <div id="inputList" class="hidden">
                    <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Nummern-Liste (eine pro Zeile, max. 12)</label>
                    <textarea id="listInput" rows="6" class="w-full p-4 border-2 rounded-md font-bold text-xl outline-none focus:border-[#064e3b] resize-none" placeholder="01-01&#10;01-02&#10;01-03..."></textarea>
                    <p class="text-xs text-gray-400 mt-1 uppercase">Jede Zeile entspricht einem Etikett auf dem Bogen.</p>
                </div>

                <div>
                    <label class="flex justify-between text-sm font-bold mb-1 text-gray-600 uppercase">
                        <span>Schriftgröße</span>
                        <span id="fontSizeDisplay" class="font-mono text-[#064e3b]">48</span>
                    </label>
                    <input type="range" id="textSize" min="10" max="120" value="48" class="w-full cursor-pointer accent-[#064e3b]">
                </div>
            </div>

            <button id="pdfBtn" class="w-full bg-[#064e3b] text-white py-5 rounded-md font-black text-2xl hover:bg-green-800 transition-all shadow-md mt-10 tracking-widest uppercase">
                BOGEN GENERIEREN
            </button>
        </section>

        <section class="flex flex-col items-center">
            <span class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-widest">Vorschau (Etikett 1)</span>
            <div class="preview-container shadow-2xl">
                <div id="previewCard" class="label-canvas color-lo">
                    <span id="pText">LO-</span>
                </div>
            </div>
            <p class="mt-4 text-xs text-gray-500 uppercase">Avery Zweckform 99,1 x 42,3 mm (12er)</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
