<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP SCHILDER APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen">

    <header class="bg-[#064e3b] p-5 shadow-md">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase">AP SCHILDER APP</h1>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-2 gap-10 mt-6">
        
        <section class="bg-white p-8 rounded-lg shadow-xl border border-gray-200">
            <h2 class="text-xl font-bold border-b pb-2 mb-6 uppercase text-gray-700">Konfiguration</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Stoffklasse (Farbe)</label>
                    <select id="subClass" class="w-full p-3 border-2 rounded-md bg-gray-50 font-bold outline-none focus:border-[#064e3b]">
                        <option value="white">Wasser / Neutral (Weiß)</option>
                        <option value="yellow">Gase (Gelb)</option>
                        <option value="red">Dampf (Rot)</option>
                        <option value="brown">Brennbare Stoffe (Braun)</option>
                        <option value="green">Wasser (Grün)</option>
                        <option value="blue">Luft (Blau)</option>
                        <option value="violet">Säuren / Laugen (Violett)</option>
                    </select>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Textinhalt</label>
                        <input type="text" id="mainText" class="w-full p-3 border-2 rounded-md font-bold outline-none focus:border-[#064e3b]" placeholder="z.B. Stickstoff">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Format</label>
                        <select id="textCase" class="w-full p-3 border-2 rounded-md font-bold outline-none focus:border-[#064e3b]">
                            <option value="upper">GROSS</option>
                            <option value="lower">klein</option>
                            <option value="original">Original</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="flex justify-between text-sm font-bold mb-1 text-gray-600 uppercase">
                        <span>Schriftgröße</span>
                        <span id="fontSizeVal">30</span>
                    </label>
                    <input type="range" id="textSize" min="15" max="60" value="30" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#064e3b]">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Signalwort</label>
                        <select id="signal" class="w-full p-3 border-2 rounded-md font-bold outline-none focus:border-[#064e3b]">
                            <option value="">Keines</option>
                            <option value="GEFAHR">GEFAHR</option>
                            <option value="ACHTUNG">ACHTUNG</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-gray-600 uppercase">Pfeil</label>
                        <select id="arrowDir" class="w-full p-3 border-2 rounded-md font-bold outline-none focus:border-[#064e3b]">
                            <option value="none">Kein Pfeil</option>
                            <option value="right">Rechts →</option>
                            <option value="left">Links ←</option>
                            <option value="up">Oben ↑</option>
                            <option value="down">Unten ↓</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-600 uppercase">GHS Symbole (Max. 5)</label>
                    <div id="ghsPicker" class="grid grid-cols-3 md:grid-cols-5 gap-2 bg-gray-50 p-3 rounded-md border-2">
                        </div>
                </div>
            </div>

            <button id="pdfBtn" class="w-full bg-[#064e3b] text-white py-4 rounded-md font-black text-2xl hover:bg-green-800 transition-all shadow-md mt-8 tracking-widest">
                DRUCKEN
            </button>
        </section>

        <section class="flex flex-col items-center">
            <span class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-widest">Live-Vorschau</span>
            <div class="preview-wrapper shadow-2xl">
                <div id="previewCard" class="label-box">
                    <div id="pText" class="label-text">TEXT</div>
                    <div class="label-bottom">
                        <div id="pGhs" class="ghs-zone"></div>
                        <div id="pSignal" class="signal-zone"></div>
                        <div id="pArrow" class="arrow-zone">
                            <svg id="previewArrowSvg" viewBox="0 0 100 100" class="w-full h-full fill-current"></svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
